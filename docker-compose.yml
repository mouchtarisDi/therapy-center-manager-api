services:
  db:
    image: postgres:16
    container_name: tcm_postgres
    environment:
      POSTGRES_DB: therapy_center
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - tcm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d therapy_center"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tcm_pgdata: